<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>表格标签</title>
	</head>
	<body>
		<!--align 对齐方式 left左边  right 右边 center剧中-->
		<table border="2px" bordercolor="black" width="60%" height="300px" align="center" cellspacing="10px" cellpadding="20">
			<tr>
				<th>姓名</th>
			   <th>性别</th>
			   <th>学号</th>
			</tr>
			<tr>
				<td>张三</td>
				<td>男</td>
			    <td>025818</td>
			</tr>
			
			<tr>
				<td>小红</td>
			<td>女</td>
			<td>852152</td>
			</tr>
		</table>

		
				
        <!--姓名文本输入框-->
        <table border="2px" bordercolor="black" width="60%" height="300px" align="center" cellspacing="10px" cellpadding="20">
        	<tr>
					<td>用户名</td>
					<td>
						用户名：<input type="text" name="username" value="张三" size="40"/>
					</td>
				</tr>
				<tr>
					<td>密码</td>
					<td>
						用户密码：<input type="password" name="pwd" value="123456" size="40" />
					</td>
				</tr>
				<tr>
					<td>性别</td>
					<td>
					  <input type="radio" name="gender" value="male" checked/> 男
					  <input type="radio" name="gender" value="female" checked/> 女
					</td>
			    </tr>
			    
			    <tr>
			    	<td>爱好</td>
			    	<td>
			    		<input type="checkbox" name="hobby" value="python" checked />python
			    		<input type="checkbox" name="hobby" value="wzry" checked />王者荣耀
			    		<input type="checkbox" name="hobby" value="chiji" checked />吃鸡
			    		<input type="checkbox" name="hobby" value="duanlian" checked />锻炼
			    	</td>
			    </tr>
			    
			    <tr>
			    	<td>上传照片</td>
			    	<td>
			    		<input type="file" name="photo"/>
			    	</td>
			    </tr>
			    
			    <tr>
			    	<td>邮箱</td>
			    	<td>
			    		<input type="email" name="email" />
			    	</td>
			    </tr>
			    
			    <tr>
			    	<td>日期</td>
			    	<td>
			    		<input type="date" name="data" value="2025-12-8" />
			    	</td>
			    </tr>
			    
			    <tr>
			    	<td>籍贯</td>
			    	<td>
			    		 <select>
			    		 	<option value="shanghai">上海</option>
			    		 	<option value="beijin">北京</option>
			    		 	<option value="tianjin">天津</option>
			    		 	<option value="hebei">河北</option>
			    		 	<option value="shandong">山东</option>
			    		 </select>
			    	</td>
			    </tr>
			    
			    <tr>
			    	<td></td>
			    	<td>
			    		<button type="submit">提交</button>
			    		<button type="submit">重置</button>
			    	</td>
			    </tr>
			    
		</table>
	</body>
</html>
